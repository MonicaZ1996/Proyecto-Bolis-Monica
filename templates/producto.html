{% extends "base.html" %}

{% block content %}

<h1 style="text-align:center; color:#6a0dad;">🍧 Lista de Productos</h1>

<div style="text-align:center; margin-bottom:20px;">
    <a href="/producto/crear" 
       style="background:#ff66b2; color:white; padding:10px 20px;
              border-radius:10px; text-decoration:none;">
        ➕ Nuevo Producto
    </a>
</div>

<table style="width:90%; margin:auto; border-collapse:collapse;">
    <tr style="background:#ff66b2; color:white;">
        <th>ID</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Acciones</th>
    </tr>

    {% for p in producto %}
    <tr style="text-align:center;">
        <td>{{ p.id_producto }}</td>
        <td>{{ p.nombre }}</td>
        <td>$ {{ p.precio }}</td>
        <td>{{ p.stock }}</td>
        <td>
            <a href="/producto/editar/{{ p.id_producto }}">✏ Editar</a> |
            <a href="/producto/eliminar/{{ p.id_producto }}">🗑 Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
